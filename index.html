<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de Prompts</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.js"></script>
<style>
:root{
  --bg:#0f172a;
  --card:rgba(255,255,255,0.08);
  --line:rgba(255,255,255,0.12);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --accent:#22c55e;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(180deg,#0f172a,#111827);
  color:var(--text);
}

.container{
  width:min(1200px,calc(100% - 24px));
  margin:auto;
}

.hero{
  padding:40px 0 20px;
}

.badge{
  background:rgba(34,197,94,0.2);
  border:1px solid rgba(34,197,94,0.4);
  padding:7px 12px;
  border-radius:999px;
  font-size:13px;
  display:inline-block;
}

h1{
  margin:12px 0;
  font-size:40px;
}

.subtitle{
  color:var(--muted);
  max-width:700px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:16px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.card img{
  width:100%;
  aspect-ratio:9/16; /* padrão 1080x1920 */
  border-radius:10px;
  object-fit:cover;
  cursor:pointer;
}

.tag{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(34,197,94,0.15);
  border:1px solid rgba(34,197,94,0.3);
  width:max-content;
}

.prompt{
  background:#020617;
  padding:10px;
  border-radius:10px;
  font-size:13px;
  white-space:pre-wrap;
  max-height:160px;
  overflow:auto;
}

button{
  margin-top:auto;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.82);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

.modal.active{
  display:flex;
}

.modal-content{
  width:min(900px,100%);
  max-height:90vh;
  overflow:auto;
  background:#111827;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;
  padding:18px;
}

.modal-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.modal-title{
  margin:0;
  font-size:24px;
}

.close-btn{
  margin-top:0;
  min-width:44px;
}

.modal-image{
  width:100%;
  border-radius:14px;
  max-height:560px;
  object-fit:contain;
  background:#020617;
}

.modal-prompt{
  margin-top:16px;
  background:#020617;
  padding:14px;
  border-radius:12px;
  white-space:pre-wrap;
  line-height:1.6;
  font-size:14px;
}

.modal-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.footer{
  text-align:center;
  color:#94a3b8;
  font-size:13px;
  padding:30px 0;
}
</style>
</head>
<body>

<div class="container">

<div class="hero">
<div class="badge">Biblioteca de Prompts</div>
<h1>Prompts com foto</h1>
<p class="subtitle">Clique para copiar o prompt e ver a imagem de referência. A foto fica separada e o texto é extraído do PDF da mesma pasta.</p>
</div>

<div class="cards" id="cards"></div>

<div class="footer">Galeria de prompts</div>

</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-top">
      <div>
        <div class="tag" id="modalSector">Setor</div>
        <h2 class="modal-title" id="modalTitle">Título</h2>
      </div>
      <button class="close-btn" id="closeModal">X</button>
    </div>

    <img class="modal-image" id="modalImage" src="" alt="Foto do prompt">

    <div class="modal-prompt" id="modalPrompt"></div>

    <div class="modal-actions">
      <button id="copyModalPrompt">Copiar prompt</button>
    </div>
  </div>
</div>

<script>
/* =====================================
   O SISTEMA AGORA LÊ OS PROMPTS DE
   UM ARQUIVO prompts_sistema.json
   ===================================== */

let prompts = [];

const cards = document.getElementById("cards");
const modal = document.getElementById("modal");
const modalImage = document.getElementById("modalImage");
const modalTitle = document.getElementById("modalTitle");
const modalSector = document.getElementById("modalSector");
const modalPrompt = document.getElementById("modalPrompt");
const closeModal = document.getElementById("closeModal");
const copyModalPrompt = document.getElementById("copyModalPrompt");

let selectedPrompt = null;

if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.worker.min.js";
}

function getImagePath(img) {
  if (!img) return "";
  const fileName = String(img).split("/").pop();
  return `fotos/${fileName}`;
}

async function loadPrompts() {
  try {
    const res = await fetch("prompts_sistema.json");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    prompts = data.map(item => ({
      ...item,
      img: item.img || "",
      pdf: item.pdf || "",
      prompt: item.prompt || ""
    }));

    render();
  } catch (e) {
    console.error("Erro ao carregar prompts_sistema.json", e);
    cards.innerHTML = '<div class="card"><h3>Erro ao carregar</h3><div class="prompt">Confira se o arquivo prompts_sistema.json está na mesma pasta do index.html.</div></div>';
  }
}

async function extractTextFromPDF(pdfPath) {
  if (!window.pdfjsLib) {
    throw new Error("PDF.js não carregou.");
  }

  const pdf = await pdfjsLib.getDocument(pdfPath).promise;
  let fullText = "";

  for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
    const page = await pdf.getPage(pageNumber);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(" ");
    fullText += pageText + "\n\n";
  }

  return fullText.trim();
}

function render() {
  cards.innerHTML = "";

  prompts.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${getImagePath(p.img)}" alt="${p.title}" class="open-modal">
      <div class="tag">${p.sector || "Sem setor"}</div>
      <h3>${p.title || "Sem título"}</h3>
      <div class="prompt">${p.prompt || "Clique na foto para carregar o prompt"}</div>
      <button type="button">Copiar prompt</button>
    `;

    const btn = card.querySelector("button");
    const image = card.querySelector(".open-modal");

    btn.onclick = async () => {
      if (!p.prompt && p.pdf) {
        try {
          p.prompt = await extractTextFromPDF(p.pdf);
          render();
        } catch (error) {
          p.prompt = "Não foi possível extrair o texto do PDF.";
          render();
        }
      }

      await navigator.clipboard.writeText(p.prompt || "");
      btn.innerText = "Copiado!";

      setTimeout(() => {
        btn.innerText = "Copiar prompt";
      }, 1500);
    };

    image.onclick = async () => {
      selectedPrompt = p;

      modalImage.src = getImagePath(p.img);
      modalTitle.innerText = p.title || "Sem título";
      modalSector.innerText = p.sector || "Sem setor";
      modalPrompt.innerText = p.prompt || "Carregando prompt...";
      modal.classList.add("active");

      if (!p.prompt && p.pdf) {
        try {
          p.prompt = await extractTextFromPDF(p.pdf);
          modalPrompt.innerText = p.prompt;
          render();
        } catch (error) {
          p.prompt = "Não foi possível extrair o texto do PDF.";
          modalPrompt.innerText = p.prompt;
          render();
        }
      }
    };

    cards.appendChild(card);
  });
}

copyModalPrompt.onclick = async () => {
  if (!selectedPrompt) return;

  await navigator.clipboard.writeText(selectedPrompt.prompt || "");
  copyModalPrompt.innerText = "Copiado!";

  setTimeout(() => {
    copyModalPrompt.innerText = "Copiar prompt";
  }, 1500);
};

closeModal.onclick = () => {
  modal.classList.remove("active");
};

modal.onclick = (e) => {
  if (e.target === modal) {
    modal.classList.remove("active");
  }
};

loadPrompts();
</script>

</body>
</html>
